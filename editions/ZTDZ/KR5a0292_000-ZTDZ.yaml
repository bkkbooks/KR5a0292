front:
  text: 金液大丹口訣
  hash: sha256:6f895e90204b48ee5c454e3cf6ccaaef042e493dc0b33d32cb6dd55983b3d17d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0292_SJB_000-040969c, image: sjb/04/040969c.png}
body:
  text: 太微洞天白衣道者授冲虚妙靜寧眞子鄭德安序夫欲修眞必須窮理盡性以至於命可也性未明也命不可知故釋氏以性爲主命爲伴太上以命爲主性爲伴此二說甚好性爲主者先要明我父母未生己前是箇甚麽將萬境萬縁悉皆看破元來只這一點虚靈爲主此箇身體亦是虚幻既如此時末後一着作麽收拾回去佛云向上一着千聖不傳如得者名爲六通無礙六自在如來如無此着終爲頑空祖師云饒君了悟眞如性未免抛身却入身從此更兼修大藥頓超無漏作眞人太上以命爲主者先要人實腹養身保精生炁以炁化神以神合道縱横猶得長以玉樹枝莖花葉茂盛之喻工夫鍛鍊純陽爲體身外有身千千變化穿金透石現種種之神通與佛何異性命二字不可分作二亦不可併作一件說故仙家金液大丹妙訣金箱玉笥萬劫一傳玄科云遇人不傳閉天道妄傳非人泄天寳輕泄漏慢罪滅形九玄七祖受㝠考伯陽祖師云竊與腎者談曷敢輕爲書寫情記竹帛又恐泄天符若遂結舌瘖閉道獲罪誅可以口訣難以書傳諦思之不須論深藏守莫傳文平叔祖師云吾昔三傳與人三遭禍患自今已往當鉗口結舌雖鼎鑊在前刀劍加項無復敢言矣余思之願天下人悉達此道如此戒行深深當如之何既得師傳不免漏泄粉骨碎身難報師德先師云一人傳道福及九祖太上願願長生必不固靳余遂譔六十四句口訣號曰太一含眞火符直指七言詩一十七首號一秤金西江月六首應純乾卦於中括盡下手工夫玄關一竅藥物川源火候祕㫖進退抽添沐浴温養脫胎神化無不備悉此乃是余親行所得之妙望學者勤心精進刻日有驗得驗之後每日消息擬時要准辯認浮沉識昏明知早晚莫瞌睡節飲食工夫到降則取升則迎打成團發光明密密綿綿而無大過之患猖猖狂狂則有不及之憂得之非難行之爲難守之尤爲難量都來十月之辛勤永享無窮之逸樂然此未知那箇是决烈慷慨特達能仁明道者得之默而行之句句相應方遂德安之願也如遇師訣誠與不誠行與不行勤與不勤則非德安之咎也余誓曰我若悮了肯學人萬劫風刀當受考如遇此書生輕慢怠惰者永爲下鬼禍及九玄學者察焉訣曰余年十九去參師得遇至眞老白眉一言指出玄關竅有有無無誰解思得竅歸來專内視黄婆只在這些兒我今不避天詄責說與學仙人得知心下腎上中高處約以髣彿是根基莫執有象妄爲做只今凝神定此規做時跏趺須大坐絶塵忘念眼低垂鼻息綿綿調欲住欲住不住若毫釐到此切須休念起若還念起氣神離寧耐百骸如若墜任生任死勿生疑霎時百脉氣撮來心如昏悶力難支滿口玉液款款嚥便覺頭底冷風吹中間一道熱汗流流至尾閭化爲離炎炎衝入崑崙頂化作一粒玉珠垂迤迤邐邐流下來冷窨窨地如雪梨看看滴在玉池裏便將液送始相宜穿過重樓入土釜紅蓮含蘂景絶奇以意送入黄金鼎鼎底火發無人炊此是天然眞火用起時爲候少人知一刻有丹一刻採一時火起一時窺千經萬論俱不載我今漏泄願君爲每日一陽來起復急須進火莫稽遲進火别無他計較只將心意去迎之火若武時心用武火若文時以意隨積漸汞乾鉛自竭抽添進退象盈虧沐浴只忌卯酉月若還加火必傾危到此節氣宜保守過此之時謹慎施十月胎生且温養一朝現出一仙姿容貌一般無兩樣方顯神仙妙用彌更有一言相囑付切莫脫胎亂奔馳神若出時頻顧宅出熟方可遠遊嬉姑待三千功行滿玉皇下詔入丹墀詩一十七首初習坐先且跏趺坐半年次宜清靜絶塵縁然後用吾眞妙訣誠心一志守中田下手存神定志入黄宫百脉朝元炁聚中形重如山汗如雨霎時火燄自冲冲工夫到時太極無形生一炁默然一炁化陰陽清中有濁從天降黑裏藏紅自地彰火候聖人傳藥不傳火從來火候少人知于今漏泄天機妙火發初爻是子時擬時要准爐中赫赫火長紅亦用心迎入土宫每日一陽時要淮莫教錯用費神功物藥景象守一壇前芽已萌朱砂鼎底火初明中宫玉漏丁丁滴皓月横空夜氣澄升降交結水出高源下玉京火生地户發光明一升一降歸中土結就團團離坎精抽添妙用汞歸金鼎鉛藏伏鉛産玉罏汞自消二物有無成至寳抽添理法自然超浮沉沐浴沐浴之因兩意微學人須要不違時眞炁薰蒸周偏體一炁浮沉始合宜紫河車含養元神氣與精紫河車動似風輪潺潺水響華池内爍爍金光徧體春聚散變化前短之因交媾時退長成物散回歸陽消汞涸渾無事直待周天再發機養成炁母金胎神室在中宫似有如無要積功三箇月時形似橘一年數足亘天紅百日基成十旬内鍊慎持盈漸覺罏邊似菊馨已是半成消息處小心姑待出黄庭沐浴忌日兔鷄之月且開懷住火休符保聖胎十月成功光透體天門烈烈項如開移神换項朞月移神直上昇三關一透便通靈青娥仰視崑崙頂穿過黄庭入紫庭温養胎仙炁足神靈入紫宫三年温養要雍容若還塵境纖毫隔失却蓬萊路萬重自然神化九載提携身外身此時出入不由親功成行滿丹書召鶴駕翩翩謁紫宸西江月六首剥盡一陽來復温温井底靈泉紛紛白雪降長天人在瓊樓飲宴忽聽黄潰報道翠娥已至宫前二人相見結親縁料想無人得見臨得二陽來到急須喚請金公三人相會入黄宫恩義相施歡共飲用龍肝虎髓醍醐美酒香濃這般富貴是仙翁勝似豪家受用倏忽三陽交泰氤氲萬象皆春民安國富賀新正大地人人相慶不覺元宵又至皇家放賞華燈嬰兒姹女暗歡欣記取月圓時分天上有雷大壯人皆恐懼修身千山雲布炁薰蒸沐浴虚心清靜此理賢還悟得便須能解衆眞陰陽到此兩相停二八德刑相稱老陽逐出少女全家俱是男兒五行四象旺當時富貴因兹蔭起中宫黄金作壁重樓玉砌階梯更兼身内有摩尼元始懸珠可比四月純乾夏首華池菡蓞花開金波皎月映樓臺珠露荷擎堪愛以造天然造化須憑神運安排虚中功行是奇哉說與常人不解安樂歌君不見安樂窩中懶散人不貪富貴不求名但向無中尋取有須當認得假和眞大道本來俱恍惚陰陽相制却成物學者愚迷總不知萬史千經尋不出遇明師親指訣只在眉毛并眼睫高峰要到若須臾不遇直徑徒跋涉安罏鼎立根源離中有汞坎中鉛二物相將歸土釜黄婆媒合始團圓這件物無處覓要妙玄微人不識自家活計自家收任你强梁奪不得人人有炁精和神不是硃砂及水銀偃月罏中頻進火鍊就金精却一斤既有本何愁末自在逍遥長豁達逆順縱横體自同得象忘言成正覺人笑我貧我不貧爭奈身貧道不貧玄珠至寳爲吾友養在丹田無價珍空不空色不色造化循環無盡極人來問我若何爲不能共伊談論得枉勞神謾費力薄福之人誰可測未知南北與東西寧辨青黄與黑白濯甘泉滌垢污神仙也是凡人做妙用分明在目前崎崎嶇嶇行遠路賔是主主是賔賔主相看親更親契論丹經憑口訣箇中端的自然眞存其心養其性性若存時心自正無爲而爲無不爲萬境俱忘神自應非或是是或非是是非非轉執迷迷人不悟玄元理達者超昇上太微既得魚兮安用筌既渡河兮安用筏安樂窩中樂道歌便是長生不死訣歸眞篇示後學道卽心也心卽道也道由心生心由道有因心明道因道悟心心生爲性性從心有此性者眞性也無生無滅無去無來不增不咸如如自然炳焕靈明圓通太虚者是也變化感通之謂神神之由也神無心不立心無炁不成炁無精不有精無炁不生炁無神不運神無炁不行炁無精不住精無神之凝神無心不守心無神不靈神之靈也不疾而速不求而至變化不測自然而然而亦不知其所以然而然也心神妙用我知之矣故達磨西來不立文字面壁九年直指人心見性成佛者是也此心者非思慮念想有形可揣之心乃天心之心人中之心也在人身中求之不可求於他也非遇至人不可得而聞不可得而見雖遇至人密而授之若不自下靜定工夫於大死場中認得分明亦不許知之既知也眞知也悟之也一從斯有二從斯得三生萬物造化無窮焉於是佛仙聖人深明大道洞悟天心陰陽造化妙理玄機皆從此心而得也聖人之心凡人之心其實一心而已悟之者聖迷之者凡噫道在邇而求諸遠事在易而求諸難何哉眞如妙性箇箇圓成因貪因著了無是處大丈夫决烈慨慷直下承當領斯之言向此用功與道合眞矣抽添詩意到玄關抽百脉眞鉛海底放金光神歸混沌添眞水靈汞山頭化玉漿金液大丹囗訣
